<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DON'T OPEN THIS! 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --teal: #008080; --cyan: #00FFFF; --pink: #FF69B4;
            --gold: #FFD700; --yellow: #FFFF00; --white: #FFFFFF;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: black; color: white; }

        .screen { display: none; width: 100vw; height: 100vh; position: absolute; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a, #000); }
        .active { display: flex; }

        /* PHASE 1: Runaway */
        #runaway-btn { background: var(--pink); color: white; padding: 15px 30px; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; position: absolute; transition: 0.1s; }
        #pass-btn { display: none; position: fixed; right: 20px; bottom: 20px; background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; animation: slideIn 0.5s forwards; }

        /* PHASE 2: Polaroids */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .polaroid { width: 200px; height: 250px; perspective: 1000px; cursor: pointer; }
        .pol-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .pol-front, .pol-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 10px solid white; border-bottom: 40px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.5); box-sizing: border-box;}
        .pol-front { background: var(--teal); display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; }
        .pol-back { background: var(--white); transform: rotateY(180deg); color: black; font-family: 'Caveat', cursive; padding: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .pink-text { color: var(--pink); }

        /* PHASE 3: Hearts */
        .heart-btn { font-size: 5rem; cursor: pointer; background: none; border: none; animation: pulse 1s infinite; transition: transform 0.1s; }
        .floating-heart { position: fixed; font-size: 2rem; pointer-events: none; z-index: 100; animation: floatUp 2s forwards; }

        /* PHASE 4: Cake */
        .cake-box { font-size: 8rem; cursor: pointer; transition: 0.3s; position: relative; }
        .cake-box:active { transform: scale(0.9); }
        
        /* Animations */
        @keyframes slideIn { from { right: -150px; } to { right: 20px; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes floatUp { to { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <section id="s1" class="screen active">
        <h1 style="color: var(--cyan); margin-bottom: 50px;">Is it too soon to be 23?</h1>
        <button id="runaway-btn">YES, GO BACK!</button>
        <button id="pass-btn" onclick="next(2)">Fine, I'll be 23... Pass →</button>
    </section>

    <section id="s2" class="screen">
        <h2 style="color: var(--gold);">6 Reasons You're Amazing</h2>
        <div class="grid" id="polaroid-grid">
            </div>
        <button id="next2" style="margin-top:40px; display:none;" onclick="next(3)">Enough Sappy Stuff →</button>
    </section>

    <section id="s3" class="screen">
        <h2 style="color: var(--pink);">Smasher the Heart!</h2>
        <p>Fill the screen with love to see your cake.</p>
        <button class="heart-btn" onclick="spawnHeart(this)">💖</button>
    </section>

    <section id="s4" class="screen">
        <h1 style="color: var(--yellow); text-align: center;">MAKE A WISH & CLICK!</h1>
        <div class="cake-box" onclick="cutCake()">🎂</div>
        <h2 id="final-msg" style="display:none; color: var(--cyan);">HAPPY 23rd BIRTHDAY! 🎉</h2>
    </section>

    <script>
        const messages = [
            "Your <span class='pink-text'>smile</span> lights up the room!",
            "23 looks <span class='pink-text'>iconic</span> on you.",
            "Always keep that <span class='pink-text'>Teal</span> energy.",
            "You are a <span class='pink-text'>true friend</span>.",
            "To more <span class='pink-text'>adventures</span>!",
            "You're the <span class='pink-text'>main character</span>."
        ];

        // Phase 1: Runaway Button Logic
        const btn = document.getElementById('runaway-btn');
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX; const y = e.clientY;
            const bx = btn.offsetLeft + btn.offsetWidth/2;
            const by = btn.offsetTop + btn.offsetHeight/2;
            const dist = Math.sqrt((x-bx)**2 + (y-by)**2);
            if(dist < 100) {
                btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
                btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            }
        });
        setTimeout(() => document.getElementById('pass-btn').style.display = 'block', 15000);

        // Phase 2: Setup Polaroids
        const grid = document.getElementById('polaroid-grid');
        let flips = 0;
        messages.forEach((msg, i) => {
            const pol = document.createElement('div');
            pol.className = 'polaroid';
            pol.innerHTML = `
                <div class="pol-inner" onclick="flip(this)">
                    <div class="pol-front">✨</div>
                    <div class="pol-back">${msg}</div>
                </div>`;
            grid.appendChild(pol);
        });

        function flip(el) {
            if(!el.classList.contains('flipped')) {
                el.classList.add('flipped');
                flips++;
                if(flips === 6) document.getElementById('next2').style.display = 'block';
            }
        }

        // Phase 3: Heart Logic
        let heartCount = 0;
        function spawnHeart(btnEl) {
            heartCount++;
            const h = document.createElement('div');
            h.className = 'floating-heart';
            h.innerHTML = ['💖','💗','teal','💎'][Math.floor(Math.random()*4)];
            if(h.innerHTML === 'teal') h.innerHTML = '🩵';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '100vh';
            document.body.appendChild(h);
            if(heartCount > 25) next(4);
        }

        // Phase 4: Cake
        function cutCake() {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 }, colors: ['#008080', '#FF69B4', '#FFD700'] });
            document.querySelector('.cake-box').innerHTML = '🍰';
            document.getElementById('final-msg').style.display = 'block';
        }

        function next(num) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + num).classList.add('active');
        }
    </script>
</body>
</html>
